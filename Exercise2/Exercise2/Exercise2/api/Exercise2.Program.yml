  source:
    remote:
      path: Exercise2/Exercise2/Exercise2/Program.cs
      branch: main
      repo: https://github.com/KarlqvistLars/Lexicon_LTU-VT2026.git
    id: BuyTicket
    path: Program.cs
    startLine: 247
  assemblies:
  - Exercise2
  namespace: Exercise2
  summary: >-
    Skapa en biljett baserat på ålder, där biljettypen bestäms av ChooseTicketType-metoden. 

    Om åldern är ogiltig (0 eller negativ) så skrivs ett felmeddelande ut och ingen biljett skapas. 

    Metoden returnerar en Tickets-struktur som innehåller antalet biljetter av varje typ som köpts (i det här fallet antingen 1 av en typ eller 0 av alla typer).
  example: []
  syntax:
    content: protected static Program.Tickets BuyTicket(int age)
    parameters:
    - id: age
      type: System.Int32
      description: Åldern på personen som ska köpa biljett
    return:
      type: Exercise2.Program.Tickets
      description: En Tickets-struktur som innehåller antalet biljetter av varje typ som köpts
    content.vb: Protected Shared Function BuyTicket(age As Integer) As Program.Tickets
  overload: Exercise2.Program.BuyTicket*
